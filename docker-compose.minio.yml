services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: kichkintoy_minio
      MINIO_ROOT_PASSWORD: kichkintoy_minio_password
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 kichkintoy_minio kichkintoy_minio_password; do sleep 1; done;
      mc mb --ignore-existing local/kichkintoy-media;
      mc anonymous set none local/kichkintoy-media;
      "

volumes:
  minio_data:
