services:
  postgres:
    image: postgres:18
    container_name: kichkintoy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kichkintoy
      POSTGRES_USER: kichkintoy
      POSTGRES_PASSWORD: kichkintoy_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kichkintoy -d kichkintoy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
